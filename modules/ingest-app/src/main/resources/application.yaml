spring:
    threads:
        virtual:
            enabled: true
    application:
        name: GTFSynq-Ingest
    kafka:
        topic: gtfs-trip-updates
        bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
        streams:
            properties:
                auto.create.topics: "true"

server:
    port: ${SERVER_PORT:8081}

gtfs:
    sources:
        gtfs-de:
            static-config:
                url: https://download.gtfs.de/germany/free/latest.zip
            realtime-config:
                urls:
                    - https://realtime.gtfs.de/realtime-free.pb
                poll-interval-seconds: 30

        entur:
            static-config:
                url: https://storage.googleapis.com/marduk-production/outbound/gtfs/rb_norway-aggregated-gtfs-basic.zip
            realtime-config:
                urls:
                    - https://api.entur.io/realtime/v1/gtfs-rt/trip-updates
                poll-interval-seconds: 30

        helsinki-hsl:
            static-config:
                url: https://infopalvelut.storage.hsldev.com/gtfs/hsl.zip
            realtime-config:
                urls:
                    - https://realtime.hsl.fi/realtime/trip-updates/v2/hsl
                poll-interval-seconds: 30

        ovapi:
            static-config:
                url: https://gtfs.ovapi.nl/nl/gtfs-nl.zip
            realtime-config:
                urls:
                    - https://gtfs.ovapi.nl/nl/tripUpdates.pb
                poll-interval-seconds: 30

        sncf:
            static-config:
                url: https://eu.ftp.opendatasoft.com/sncf/plandata/Export_OpenData_SNCF_GTFS_NewTripId.zip
            realtime-config:
                urls:
                    - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-trip-updates
                    - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-service-alerts
                poll-interval-seconds: 30

# GTFSynq-specific configuration
gtfsynq:
    # Polling configuration
    polling:
        interval-ms: 30000
        enabled: true

    # Source configuration
    source:
        rest:
            enabled: true
            timeout-ms: 10000
            retry-attempts: 3
            user-agent: GTFSynq/1.0

        websocket:
            enabled: false
            reconnect-interval-ms: 5000

    # Pipeline configuration
    pipeline:
        enabled: true

        # Filter configuration
        filters:
            deduplication:
                enabled: true
            entity-type:
                enabled: false
                # Only process these entity types (empty = all)
                allowed-types: []

    # Processor configuration
    processors:
        trip-update:
            enabled: true
        vehicle-position:
            enabled: true
        alert:
            enabled: true

# HTTP client tuning for feed polling
rest:
    readTimeoutSeconds: 120
    connectTimeoutSeconds: 40

# Native parser tuning
gtfs.readBufferSize: 8

management:
    metrics:
        tags:
            application: ${spring.application.name}
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: ALWAYS

state:
    save:
        path: data/state_dump.bin
