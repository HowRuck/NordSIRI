spring:
  threads:
    virtual:
      enabled: true
  application:
    name: GTFSynq-Ingest
  kafka:
    topic: gtfs-trip-updates
    bootstrap-servers: localhost:9092
    streams:
      properties:
        auto.create.topics: "true"

server:
  port: 8888

# GTFSynq-specific configuration
gtfsynq:
  # Polling configuration
  polling:
    interval-ms: 30000
    enabled: true

  # Feed configurations
  # Each feed has a unique ID and one or more URLs
  feeds:
    gtfs-de:
      urls:
        - https://realtime.gtfs.de/realtime-free.pb

    entur:
      urls:
        - https://api.entur.io/realtime/v1/gtfs-rt/trip-updates
        - https://api.entur.io/realtime/v1/gtfs-rt/alerts

    helsinki-hsl:
      urls:
        - https://realtime.hsl.fi/realtime/trip-updates/v2/hsl

    ovapi:
      urls:
        - https://gtfs.ovapi.nl/nl/tripUpdates.pb
        - https://gtfs.ovapi.nl/nl/alerts.pb

    sncf:
      urls:
        - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-trip-updates
        - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-service-alerts

  # Source configuration
  source:
    rest:
      enabled: true
      timeout-ms: 10000
      retry-attempts: 3
      user-agent: GTFSynq/1.0

    websocket:
      enabled: false
      reconnect-interval-ms: 5000

  # Pipeline configuration
  pipeline:
    enabled: true

    # Filter configuration
    filters:
      deduplication:
        enabled: true
      entity-type:
        enabled: false
        # Only process these entity types (empty = all)
        allowed-types: []

  # Processor configuration
  processors:
    trip-update:
      enabled: true
    vehicle-position:
      enabled: true
    alert:
      enabled: true

# Legacy configuration (for backward compatibility)
gtfs:
  fetch:
    interval-ms: 30000
  feeds:
    gtfs-de:
      - https://realtime.gtfs.de/realtime-free.pb
    entur:
      - https://api.entur.io/realtime/v1/gtfs-rt/trip-updates
      - https://api.entur.io/realtime/v1/gtfs-rt/alerts
    helsinki-hsl:
      - https://realtime.hsl.fi/realtime/trip-updates/v2/hsl
    ovapi:
      - https://gtfs.ovapi.nl/nl/tripUpdates.pb
      - https://gtfs.ovapi.nl/nl/alerts.pb
    sncf:
      - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-trip-updates
      - https://proxy.transport.data.gouv.fr/resource/sncf-gtfs-rt-service-alerts

# HTTP client tuning for feed polling
rest:
  readTimeoutSeconds: 120
  connectTimeoutSeconds: 40

# Native parser tuning
gtfs.readBufferSize: 8

management:
  metrics:
    tags:
      application: ${spring.application.name}
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: ALWAYS
