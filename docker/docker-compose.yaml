services:
    app:
        build:
            context: ..
            dockerfile: docker/Dockerfile
        container_name: gtfsynq-app
        depends_on:
            kafka:
                condition: service_healthy
            timescaledb:
                condition: service_healthy
        environment:
            SPRING_PROFILES_ACTIVE: prod
            SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/gtfsynq
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        ports:
            - "8888:8888"

    kafka:
        image: docker.io/confluentinc/cp-kafka:7.7.8
        container_name: kafka
        hostname: kafka
        ports:
            - "9092:9092"
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller

            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

            KAFKA_MESSAGE_MAX_BYTES: 10485760
            KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

            KAFKA_NUM_NETWORK_THREADS: 4
            KAFKA_NUM_IO_THREADS: 8

            KAFKA_LOG_CLEANER_ENABLE: "true"
            KAFKA_LOG_CLEANER_THREADS: 2

            CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

        volumes:
            - kafka-data:/var/lib/kafka/data

        healthcheck:
            test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    timescaledb:
        image: docker.io/timescale/timescaledb:2.26.3-pg18
        container_name: timescaledb
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: gtfsynq
        volumes:
            - timescaledb-data:/var/lib/postgresql/data
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U postgres -d gtfsynq -h localhost"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

volumes:
    kafka-data:
    timescaledb-data:

networks:
    default:
        driver: bridge
