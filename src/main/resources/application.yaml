spring:
    threads:
        virtual:
            enabled: true
    application:
        name: SiriAnalyzer
    datasource:
        url: jdbc:postgresql://localhost:5432/gtfsynq
        username: postgres
        password: postgres
    sql:
        init:
            mode: always
            schema-locations: classpath:schema.sql
    data:
        redis:
            host: localhost
            port: 6379
    kafka:
        topic: gtfs-trip-updates
        bootstrap-servers: localhost:9092
        streams:
            properties:
                auto.create.topics: "true"

gtfs:
    fetch:
        interval-ms: 20000
    feeds:
        gtfs-de:
            - https://realtime.gtfs.de/realtime-free.pb
        entur:
            - https://api.entur.io/realtime/v1/gtfs-rt/trip-updates
            - https://api.entur.io/realtime/v1/gtfs-rt/alerts

management:
    metrics:
        tags:
            application: ${spring.application.name}
    endpoints:
        web:
            exposure:
                include: "*"
    endpoint:
        health:
            show-details: ALWAYS
