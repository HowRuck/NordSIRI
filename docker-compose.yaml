services:
    app:
        build:
            context: .
            dockerfile: docker/Dockerfile
        container_name: gtfsynq-app
        network_mode: host
        depends_on:
            - kafka
            - timescaledb
        environment:
            SPRING_PROFILES_ACTIVE: prod
            SPRING_DATASOURCE_URL: jdbc:postgresql://host.containers.internal:5432/gtfsynq
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_KAFKA_BOOTSTRAP_SERVERS: host.containers.internal:9092
        ports:
            - "8888:8888"

    kafka:
        image: docker.io/apache/kafka:4.2.0
        container_name: kafka
        network_mode: host
        environment:
            KAFKA_NODE_ID: 1
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
            KAFKA_MESSAGE_MAX_BYTES: 10485760
            KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760
            KAFKA_NUM_NETWORK_THREADS: 4
            KAFKA_NUM_IO_THREADS: 8
            KAFKA_LOG_CLEANER_ENABLE: "true"
            KAFKA_LOG_CLEANER_THREADS: 2
        volumes:
            - kafka-data:/var/lib/kafka/data

    timescaledb:
        image: docker.io/timescale/timescaledb-ha:pg18
        container_name: timescaledb
        network_mode: host
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: gtfsynq
        volumes:
            - timescaledb-data:/var/lib/postgresql/data

volumes:
    kafka-data:
    timescaledb-data:
    pgadmin-data:
