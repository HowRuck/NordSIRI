services:
    api-app:
        build:
            context: .
            dockerfile: docker/api-app/Dockerfile
        container_name: gtfsynq-api-app
        depends_on:
            kafka:
                condition: service_healthy
            kafka-init:
                condition: service_completed_successfully
            timescaledb:
                condition: service_healthy
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/gtfsynq
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SERVER_PORT: 8080
        ports:
            - "8080:8080"
        volumes:
            - gtfsynq-api-data:/app/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --spider -q http://localhost:8080/actuator/health || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    ingest-app:
        build:
            context: .
            dockerfile: docker/ingest-app/Dockerfile
        container_name: gtfsynq-ingest-app
        depends_on:
            kafka:
                condition: service_healthy
            kafka-init:
                condition: service_completed_successfully
            timescaledb:
                condition: service_healthy
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/gtfsynq
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SERVER_PORT: 8081
            STATE_SAVE_PATH: /app/data/state_dump.bin
        ports:
            - "8081:8081"
        volumes:
            - gtfsynq-ingest-data:/app/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --spider -q http://localhost:8081/actuator/health || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    store-app:
        build:
            context: .
            dockerfile: docker/store-app/Dockerfile
        container_name: gtfsynq-store-app
        depends_on:
            kafka:
                condition: service_healthy
            kafka-init:
                condition: service_completed_successfully
            timescaledb:
                condition: service_healthy
        environment:
            SPRING_DATASOURCE_URL: jdbc:postgresql://timescaledb:5432/gtfsynq
            SPRING_DATASOURCE_USERNAME: postgres
            SPRING_DATASOURCE_PASSWORD: postgres
            SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
            SERVER_PORT: 8082
        ports:
            - "8082:8082"
        volumes:
            - gtfsynq-store-data:/app/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget --spider -q http://localhost:8082/actuator/health || exit 1",
                ]
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 20s

    kafka:
        image: docker.io/apache/kafka:4.2.0
        container_name: kafka
        hostname: kafka
        ports:
            - "9092:9092"
            - "9093:9093"
        environment:
            KAFKA_PROCESS_ROLES: broker,controller
            KAFKA_NODE_ID: 1
            KAFKA_CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk" # Unique cluster ID

            # Listeners configuration
            KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
            KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
            KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
            KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
            KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

            # Log retention and cleanup
            KAFKA_LOG_RETENTION_MS: 300000
            KAFKA_LOG_CLEANER_ENABLE: "true"

            # Replication factors (for standalone mode)
            KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
            KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

            # Message and fetch sizes (10MB)
            KAFKA_MESSAGE_MAX_BYTES: 10485760
            KAFKA_REPLICA_FETCH_MAX_BYTES: 10485760

        volumes:
            - kafka-data:/var/lib/kafka/data

        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092",
                ]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

    kafka-init:
        image: docker.io/apache/kafka:4.2.0
        container_name: kafka-init
        depends_on:
            kafka:
                condition: service_healthy
        entrypoint:
            - /bin/sh
            - -c
        command: >
            /opt/kafka/bin/kafka-topics.sh
            --bootstrap-server kafka:9092
            --create
            --if-not-exists
            --topic gtfs-trip-updates
            --partitions 1
            --replication-factor 1
        restart: "no"

    timescaledb:
        image: docker.io/timescale/timescaledb:2.26.3-pg18
        container_name: timescaledb
        ports:
            - "5432:5432"
        environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_DB: gtfsynq
        volumes:
            - timescaledb-data:/var/lib/postgresql/data
        healthcheck:
            test:
                ["CMD-SHELL", "pg_isready -U postgres -d gtfsynq -h localhost"]
            interval: 10s
            timeout: 5s
            retries: 12
            start_period: 20s

volumes:
    kafka-data:
    timescaledb-data:
    gtfsynq-api-data:
    gtfsynq-ingest-data:
    gtfsynq-store-data:

networks:
    default:
        driver: bridge
